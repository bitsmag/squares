version: "3.9"

services:
  node-app:
    build: .
    image: squares-main
    container_name: squares-main
    env_file:
      - ./node-app.env
    ports:
      # Expose the game server on localhost:3000
      - "3000:3000"
    depends_on:
      - bot-server

  bot-server:
    build: ./bot-server
    image: squares-bot-server
    container_name: squares-bot-server
    env_file:
      - ./bot-server.env
    # The PPO models are baked into the image via bot-server/Dockerfile (COPY models ./models).
    expose:
      - "8000"

networks:
  default:
    name: squares-network
